<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Cube</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    #unity-container { width: 100vw; height: 100vh; }
    #unity-canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>
  <script src="Build/Cube.loader.js"></script>
  <script>
    createUnityInstance(document.querySelector("#unity-canvas"), {
      dataUrl: "Build/Cube.data.br",
      frameworkUrl: "Build/Cube.framework.js.br",
      codeUrl: "Build/Cube.wasm.br",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Cube",
      productVersion: "0.1.0",
    });
  </script>
</body>
</html>
